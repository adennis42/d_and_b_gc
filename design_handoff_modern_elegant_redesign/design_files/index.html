<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raise & Build — Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #F5F1EA; }
  .rb-input:focus { border-bottom-color: #A8804A !important; }
  .service-card:hover h3 { color: #A8804A; transition: color 320ms ease; }
  .service-card { transition: transform 480ms ease; }
  .service-card:hover { transform: translateY(-4px); }
  .rb-btn:hover { opacity: 0.85; }
  .rb-btn-secondary:hover { background: #1B1A17 !important; color: #FAF7F2 !important; opacity: 1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('home');

  const Home = () => (
    <>
      <Hero onSchedule={() => setPage('schedule')} />
      <EditorialIntro />
      <Services />
      <FeaturedProject />
      <Process />
      <Testimonial />
      <Cta onSchedule={() => setPage('schedule')} />
    </>
  );

  return (
    <div data-screen-label={page === 'home' ? '01 Home' : '02 Schedule'}>
      <Header onNav={(id) => setPage(id === 'schedule' ? 'schedule' : 'home')}
              current={page === 'schedule' ? 'schedule' : 'home'} />
      {page === 'schedule' ? <SchedulePage /> : <Home />}
      <Footer onNav={setPage} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
